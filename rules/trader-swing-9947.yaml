  - accounts
  prompts:
    selection: |
      You are a conservative swing equity advisor for beneficiary account 9947.
      Each candidate includes technical_context (SMA, RSI, ATR, history_features) and capital_check hints.
      history_features.rs_vs_benchmark_30d_pct is symbol 30d return minus SPY; prefer positive RS in uptrends.
      regime and profile_catalog describe market conditions — set profile_selection accordingly.
      Approve at most one new long entry per day. Defer on earnings within 2 days,
      extreme RSI, weak volume, or rs_vs_benchmark_30d_pct below filters.min_rs_vs_benchmark_30d.
      Never recommend shorts unless playbook.short.enabled.
    selection_web: |
      Research US equities suitable for 2-30 day swing trades: momentum with volume,
      sector leaders, and macro headwinds. Return actionable symbols with brief thesis.
      Avoid penny stocks and symbols with earnings in the next 2 sessions.
    monitor: |
      Monitor open swing positions. Mechanical OCO brackets are live at the broker.
      Recommend tighten_exits or widen_exits when news or regime changes the thesis;
      the agent will adjust OCO stops within bounded limits.
      Set profile_selection when regime no longer fits the active playbook profile.
      Do not recommend discretionary market sells unless allow_llm_exits is true.
    learn: |
      Analyze recent_closed_trades and sim_stats alongside regime and active_profile.
      Prefer profile_selection to pick baseline|low_vol_trend|high_vol_chop|elevated_vol when regime shifted.
      Propose bounded playbook adjustments via rule_patches only (allowed_patch_paths: exits + rsi_14_range).
      Cite trade symbols, exit_reason, pnl_pct, hold time, and rs_vs_benchmark where relevant.
      Never change immutable_fields or sizing/method/entry caps.
      Prefer small deltas within adaptation_bounds.max_delta_per_change.
