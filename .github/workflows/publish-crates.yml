name: Publish crates.io

on:
  push:
    branches:
      - main
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/publish-crate.sh"
      - "scripts/wait-for-crate.sh"
      - "scripts/crates-io-common.sh"
      - ".github/workflows/publish-crates.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish schwab-api-cli-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: bash scripts/publish-crate.sh schwab-api-cli-core

      - name: Wait for schwab-api-cli-core index
        run: bash scripts/wait-for-crate.sh schwab-api-cli-core

      - name: Publish schwab-api-cli-market-data
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: bash scripts/publish-crate.sh schwab-api-cli-market-data

      - name: Wait for schwab-api-cli-market-data index
        run: bash scripts/wait-for-crate.sh schwab-api-cli-market-data

      - name: Publish schwab-api-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: bash scripts/publish-crate.sh schwab-api-cli
